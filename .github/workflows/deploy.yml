name: Deploy Spring App to EC2 with ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: hubspace-server
  IMAGE_SHA_TAG: ${{ github.sha }}
  IMAGE_LATEST_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Spring Boot application
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (SHA + latest)
        run: |
          ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY
          docker build \
            -t $ECR_URI:$IMAGE_SHA_TAG \
            -t $ECR_URI:$IMAGE_LATEST_TAG \
            .

      - name: Push Docker image to Amazon ECR
        run: |
          ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY
          docker push $ECR_URI:$IMAGE_SHA_TAG
          docker push $ECR_URI:$IMAGE_LATEST_TAG

      - name: Deploy to EC2 (Blue-Green)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -u

            AWS_REGION="${{ env.AWS_REGION }}"
            AWS_ACCOUNT_ID="${{ env.AWS_ACCOUNT_ID }}"
            ECR_REPOSITORY="${{ env.ECR_REPOSITORY }}"
            IMAGE_SHA_TAG="${{ env.IMAGE_SHA_TAG }}"
            ECR_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
            NEW_IMAGE="$ECR_URI:$IMAGE_SHA_TAG"

            SHA_STATE="$HOME/hubSpace/.current_image_sha"
            COLOR_STATE="$HOME/hubSpace/.active_color"
            UPSTREAM_CONF="/etc/nginx/conf.d/spring-app-upstream.inc"
            GRACE_SEC=30

            echo "[Move to application directory]"
            cd ~/hubSpace || { echo "❌ ~/hubSpace not found"; exit 1; }

            echo "[Resolve current / target color]"
            CURRENT_COLOR=$(cat "$COLOR_STATE" 2>/dev/null || echo "none")
            case "$CURRENT_COLOR" in
              blue)  TARGET_COLOR="green" ;;
              green) TARGET_COLOR="blue"  ;;
              *)     TARGET_COLOR="blue"  ;;
            esac

            if [ "$TARGET_COLOR" = "blue" ]; then
              APP_PORT=8081
              MGMT_PORT=9001
            else
              APP_PORT=8082
              MGMT_PORT=9002
            fi
            TARGET_CONTAINER="spring-app-$TARGET_COLOR"
            CURRENT_CONTAINER="spring-app-$CURRENT_COLOR"

            echo "  CURRENT=$CURRENT_COLOR  TARGET=$TARGET_COLOR  APP_PORT=$APP_PORT  MGMT_PORT=$MGMT_PORT"
            echo "  NEW_SHA=$IMAGE_SHA_TAG  PREV_SHA=$(cat "$SHA_STATE" 2>/dev/null || echo none)"

            echo "[Login to Amazon ECR]"
            if ! aws ecr get-login-password --region $AWS_REGION \
              | sudo docker login \
                --username AWS \
                --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com; then
              echo "❌ ECR login failed"
              exit 1
            fi

            echo "[Clean leftover target container if any]"
            sudo docker rm -f "$TARGET_CONTAINER" 2>/dev/null || true

            echo "[Pull new image: $NEW_IMAGE]"
            if ! sudo docker pull "$NEW_IMAGE"; then
              echo "❌ Failed to pull new image"
              exit 1
            fi

            echo "[Run target container: $TARGET_CONTAINER]"
            if ! sudo docker run -d \
              --name "$TARGET_CONTAINER" \
              --restart unless-stopped \
              --network app-network \
              --env-file .env \
              -p 127.0.0.1:$APP_PORT:8080 \
              -p 127.0.0.1:$MGMT_PORT:9000 \
              "$NEW_IMAGE"; then
              echo "❌ docker run failed for $TARGET_CONTAINER. Switch cancelled."
              sudo docker rm -f "$TARGET_CONTAINER" 2>/dev/null || true
              exit 1
            fi

            echo "[Polling http://127.0.0.1:$MGMT_PORT/actuator/health (max ~2.5 min)]"
            HEALTHY=0
            for i in $(seq 1 30); do
              sleep 5
              if curl -fsS "http://127.0.0.1:$MGMT_PORT/actuator/health" 2>/dev/null \
                | grep -q '"status":"UP"'; then
                echo "✅ Health check passed (attempt $i)"
                HEALTHY=1
                break
              fi
              echo "  attempt $i/30: not ready yet"
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "❌ Health check failed. Capturing $TARGET_CONTAINER logs:"
              sudo docker logs --tail 200 "$TARGET_CONTAINER" 2>&1 || true
              echo "↩️ Switch cancelled. Removing $TARGET_CONTAINER. $CURRENT_COLOR keeps serving."
              sudo docker rm -f "$TARGET_CONTAINER" || true
              exit 1
            fi

            echo "[Switch Nginx upstream → 127.0.0.1:$APP_PORT]"
            echo "server 127.0.0.1:$APP_PORT;" | sudo tee "$UPSTREAM_CONF" > /dev/null
            if ! sudo nginx -t; then
              echo "❌ nginx -t failed. Reverting upstream file and removing $TARGET_CONTAINER."
              if [ "$CURRENT_COLOR" = "blue" ]; then
                echo "server 127.0.0.1:8081;" | sudo tee "$UPSTREAM_CONF" > /dev/null
              elif [ "$CURRENT_COLOR" = "green" ]; then
                echo "server 127.0.0.1:8082;" | sudo tee "$UPSTREAM_CONF" > /dev/null
              fi
              sudo docker rm -f "$TARGET_CONTAINER" || true
              exit 1
            fi
            sudo nginx -s reload
            echo "✅ Nginx reloaded. Traffic now on $TARGET_COLOR."

            echo "[Persist state]"
            echo "$TARGET_COLOR"  > "$COLOR_STATE"
            echo "$IMAGE_SHA_TAG" > "$SHA_STATE"

            if [ "$CURRENT_COLOR" = "blue" ] || [ "$CURRENT_COLOR" = "green" ]; then
              echo "[Grace] sleep ${GRACE_SEC}s for in-flight requests, then stop $CURRENT_CONTAINER"
              sleep $GRACE_SEC
              sudo docker rm -f "$CURRENT_CONTAINER" 2>/dev/null || true
            fi

            echo "🧹 Prune unused images"
            sudo docker image prune -f
            echo "📋 Recent logs from $TARGET_CONTAINER"
            sudo docker logs --tail 100 "$TARGET_CONTAINER"
            exit 0

      - name: Keep only last 3 images in ECR
        if: success()
        run: |
          OLD_DIGESTS=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --query 'sort_by(imageDetails,&imagePushedAt)[:-3].imageDigest' \
            --output text)

          if [ -z "$OLD_DIGESTS" ]; then
            echo "No old images to delete."
            exit 0
          fi

          IMAGE_IDS=""
          for digest in $OLD_DIGESTS; do
            IMAGE_IDS="$IMAGE_IDS imageDigest=$digest"
          done

          echo "Deleting old images: $IMAGE_IDS"
          aws ecr batch-delete-image \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --image-ids $IMAGE_IDS
